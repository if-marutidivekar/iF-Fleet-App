events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Access logging ─────────────────────────────────────────────────────────
  log_format json_combined escape=json
    '{"time":"$time_iso8601",'
    '"method":"$request_method","uri":"$request_uri",'
    '"status":$status,"bytes":$body_bytes_sent,'
    '"duration":$request_time,"ip":"$remote_addr",'
    '"req_id":"$http_x_request_id"}';

  access_log /var/log/nginx/access.log json_combined;
  error_log  /var/log/nginx/error.log warn;

  # ── Request ID correlation ──────────────────────────────────────────────────
  add_header X-Request-ID $request_id always;

  # ── Security headers ───────────────────────────────────────────────────────
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # ── Rate limiting ──────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # ── Upstream services ──────────────────────────────────────────────────────
  upstream api_backend {
    server api:3001;
    keepalive 32;
  }

  upstream web_frontend {
    server web-app:3000;
    keepalive 16;
  }

  upstream grafana_backend {
    server grafana:3000;
  }

  # ── Main server block ──────────────────────────────────────────────────────
  server {
    listen 80;
    server_name staging-fleet-web.internal;

    # Health check (nginx-level — bypasses upstreams)
    location = /health {
      access_log off;
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }

    # Auth endpoints — stricter rate limit
    location ~ ^/api/v1/auth/(request-otp|verify-otp) {
      limit_req zone=auth burst=3 nodelay;
      proxy_pass http://api_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Request-ID $request_id;
    }

    # API
    location /api/ {
      limit_req zone=api burst=60 nodelay;
      proxy_pass http://api_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Request-ID $request_id;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_http_version 1.1;
      proxy_read_timeout 120s;
    }

    # Grafana (internal ops only — protect with additional auth in production)
    location /grafana/ {
      proxy_pass http://grafana_backend/;
      proxy_set_header Host $host;
    }

    # Web app (catch-all — serves React SPA)
    location / {
      proxy_pass http://web_frontend;
      proxy_set_header Host $host;
    }
  }
}

events { worker_connections 1024; }

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  sendfile    on;
  tcp_nopush  on;
  tcp_nodelay on;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml text/javascript image/svg+xml;

  # ── Logging ───────────────────────────────────────────────────────────────
  log_format json_combined escape=json
    '{"time":"$time_iso8601",'
    '"method":"$request_method","uri":"$request_uri",'
    '"status":$status,"bytes":$body_bytes_sent,'
    '"duration":$request_time,"ip":"$remote_addr",'
    '"req_id":"$http_x_request_id"}';

  access_log /var/log/nginx/access.log json_combined;
  error_log  /var/log/nginx/error.log warn;

  add_header X-Request-ID $request_id always;

  # ── Rate limiting ─────────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=api:10m  rate=30r/s;
  limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

  # ── Upstreams ─────────────────────────────────────────────────────────────
  upstream api_backend {
    server api:3001;
    keepalive 32;
  }

  upstream web_frontend {
    server web-app:3000;
    keepalive 16;
  }

  # ── HTTP: ACME challenge + redirect to HTTPS ───────────────────────────────
  server {
    listen 80;
    server_name fleet.ideaforgetech.com;

    # Let's Encrypt webroot challenge (needed for cert renewal)
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
      try_files $uri =404;
    }

    # nginx-level health check (bypasses HTTPS redirect — used by load balancers)
    location = /health {
      access_log off;
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }

    # Everything else → HTTPS
    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS server ──────────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name fleet.ideaforgetech.com;

    # ── TLS ──────────────────────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/fleet.ideaforgetech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fleet.ideaforgetech.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/fleet.ideaforgetech.com/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers   ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    # ── Health (nginx-level, no upstream dependency) ───────────────────────
    location = /health {
      access_log off;
      return 200 '{"status":"ok"}';
      add_header Content-Type application/json;
    }

    # ── Auth endpoints — strict rate limit ────────────────────────────────
    location ~ ^/api/v1/auth/(request-otp|verify-otp|driver/request-pin-login|driver/verify-pin) {
      limit_req zone=auth burst=10 nodelay;

      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-ID      $request_id;
    }

    # ── API (REST + WebSocket upgrade for Socket.io) ──────────────────────
    location /api/ {
      limit_req zone=api burst=60 nodelay;

      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-ID      $request_id;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_read_timeout 120s;
    }

    # ── Socket.io long-poll / WebSocket (separate timeout) ───────────────
    location /socket.io/ {
      proxy_pass         http://api_backend;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Upgrade           $http_upgrade;
      proxy_set_header   Connection        "upgrade";
      proxy_read_timeout 3600s;   # keep WS connections alive
    }

    # ── React SPA (catch-all) ─────────────────────────────────────────────
    location / {
      proxy_pass       http://web_frontend;
      proxy_set_header Host $host;
    }
  }
}
